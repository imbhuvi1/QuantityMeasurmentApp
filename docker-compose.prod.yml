version: '3.8'

services:
  # MySQL Database - Production Configuration
  mysql:
    image: mysql:8.0
    container_name: qma-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: quantitymeasurementdb
      MYSQL_USER: qma_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./mysql-config/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - qma-prod-network
    secrets:
      - mysql_root_password
      - mysql_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Spring Boot Application - Production Configuration
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qma-app-prod
    restart: always
    ports:
      - "80:8080"
    environment:
      # Database configuration
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quantitymeasurementdb?useSSL=true&requireSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: qma_user
      SPRING_DATASOURCE_PASSWORD_FILE: /run/secrets/mysql_password
      
      # JPA configuration - Production settings
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      
      # Connection pool settings
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 20000
      
      # JWT configuration
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_EXPIRATION: 86400000
      
      # OAuth2 configuration
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID_FILE: /run/secrets/google_client_id
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
      
      # Application configuration
      SPRING_APPLICATION_NAME: QuantityMeasurementApplication
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      
      # Logging - Production level
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_COM_APPS_QUANTITYMEASUREMENT: INFO
      LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
      
      # JVM settings for production
      JAVA_OPTS: "-Xmx1g -Xms512m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
      
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - qma-prod-network
    secrets:
      - mysql_password
      - jwt_secret
      - google_client_id
      - google_client_secret
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: qma-nginx-prod
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - qma-prod-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

volumes:
  mysql_prod_data:
    driver: local

networks:
  qma-prod-network:
    driver: bridge

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  google_client_id:
    file: ./secrets/google_client_id.txt
  google_client_secret:
    file: ./secrets/google_client_secret.txt