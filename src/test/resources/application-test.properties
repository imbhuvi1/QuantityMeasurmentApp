# Test application properties
# This file can contain test-specific configurations

# Test Database Configuration (H2 in-memory for testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Configuration for Tests
jwt.secret=testSecretKey123456789012345678901234567890
jwt.expiration=3600000

# Disable OAuth2 for tests
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Logging for Tests
logging.level.com.apps.quantitymeasurement=DEBUG
logging.level.org.springframework.security=DEBUG